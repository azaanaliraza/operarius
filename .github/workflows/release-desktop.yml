name: Release Desktop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.1)"
        required: true
        default: "v0.1.0"
      draft:
        description: "Create as draft release"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref || inputs.tag }}
  cancel-in-progress: false

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            rust_target: x86_64-apple-darwin
            build_args: --target x86_64-apple-darwin
            extra_args: ""
            tauri_script: bun tauri
          - platform: macos-14
            rust_target: aarch64-apple-darwin
            build_args: --target aarch64-apple-darwin
            extra_args: ""
            tauri_script: bun tauri
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            build_args: --target x86_64-pc-windows-msvc
            extra_args: --config src-tauri/tauri.windows.conf.json
            tauri_script: bun tauri

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifacts
        working-directory: src-tauri
        run: ${{ matrix.tauri_script }} build ${{ matrix.build_args }} ${{ matrix.extra_args }}

      - name: Upload built artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.rust_target }}
          path: src-tauri/target/${{ matrix.rust_target }}/release/bundle/**
          if-no-files-found: error

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Collect end-user install assets
        run: |
          set -euo pipefail
          mkdir -p release-upload

          # Keep only files users actually download/install.
          find release-artifacts -type f \(
            -name "*.dmg" -o
            -name "*.app.tar.gz" -o
            -name "*.msi" -o
            -name "*.exe" -o
            -name "*.zip"
          \) -print0 | while IFS= read -r -d '' file; do
            cp "$file" release-upload/
          done

          if ! ls -1 release-upload/* >/dev/null 2>&1; then
            echo "No installable assets were found in release artifacts."
            exit 1
          fi

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-upload
          find . -type f -print0 | sort -z | xargs -0 shasum -a 256 > SHA256SUMS.txt

      - name: Generate release notes
        run: |
          set -euo pipefail
          cat > release-upload/RELEASE_NOTES.md <<EOF
          # ✹ OPERARIUS ${RELEASE_TAG}
          > **The Private AI Orchestrator: Local. Deterministic. Sovereign.**

          Operarius ${RELEASE_TAG} marks the transition to a production-ready, monolithic process architecture optimized for Apple Silicon and private neural computing.

          ### ⚡ Neural Breakthroughs
          - **Synchronized KV Cache**: Anchored system prompts for sub-second responses.
          - **Resonance Logic**: Unified 64k-context threshold for deep reasoning.
          - **Sanctuary Protocol**: Isolated runtime sanctuary to prevent infinite rebuild loops.

          ### 📦 Installation Assets
          - **macOS Apple Silicon**: Download the \`aarch64\` .dmg for native M1/M2/M3 performance.
          - **macOS Intel**: Download the \`x86_64\` .dmg (cross-compiled for legacy compatibility).
          - **Windows x64**: Download the \`.msi\` for a seamless logic-vault installation.

          ### 🛡️ Security & Verification
          Every asset is hashed for your protection. Verify your download using the included \`SHA256SUMS.txt\`.

          \`\`\`bash
          shasum -a 256 -c SHA256SUMS.txt
          \`\`\`

          **Operarius is 100% Local. Your data never leaves your silicon.**
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Operarius ${{ env.RELEASE_TAG }}
          body_path: release-upload/RELEASE_NOTES.md
          generate_release_notes: true
          append_body: true
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: release-upload/**
