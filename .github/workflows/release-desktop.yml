name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.1)"
        required: true
        default: "v0.1.0"
      draft:
        description: "Create as draft release"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref || inputs.tag }}
  cancel-in-progress: false

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-13
            rust_target: x86_64-apple-darwin
            build_args: --target x86_64-apple-darwin
            extra_args: ""
            tauri_script: bun tauri
          - platform: macos-14
            rust_target: aarch64-apple-darwin
            build_args: --target aarch64-apple-darwin
            extra_args: ""
            tauri_script: bun tauri
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            build_args: --target x86_64-pc-windows-msvc
            extra_args: --config src-tauri/tauri.windows.conf.json
            tauri_script: bun tauri

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build release artifacts
        working-directory: src-tauri
        run: ${{ matrix.tauri_script }} build ${{ matrix.build_args }} ${{ matrix.extra_args }}

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rust_target }}
          path: src-tauri/target/${{ matrix.rust_target }}/release/bundle/**
          if-no-files-found: error

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: Operarius ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          body: |
            Desktop release for macOS and Windows.

            Targets:
            - macOS Intel
            - macOS Apple Silicon
            - Windows x64
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: release-artifacts/**
