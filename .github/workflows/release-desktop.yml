name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.1)"
        required: true
        default: "v0.1.0"
      draft:
        description: "Create as draft release"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref || inputs.tag }}
  cancel-in-progress: false

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-13
            rust_target: x86_64-apple-darwin
            build_args: --target x86_64-apple-darwin
            extra_args: ""
            tauri_script: bun tauri
          - platform: macos-14
            rust_target: aarch64-apple-darwin
            build_args: --target aarch64-apple-darwin
            extra_args: ""
            tauri_script: bun tauri
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            build_args: --target x86_64-pc-windows-msvc
            extra_args: --config src-tauri/tauri.windows.conf.json
            tauri_script: bun tauri

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifacts
        working-directory: src-tauri
        run: ${{ matrix.tauri_script }} build ${{ matrix.build_args }} ${{ matrix.extra_args }}

      - name: Upload built artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.rust_target }}
          path: src-tauri/target/${{ matrix.rust_target }}/release/bundle/**
          if-no-files-found: error

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Collect end-user install assets
        run: |
          set -euo pipefail
          mkdir -p release-upload

          # Keep only files users actually download/install.
          find release-artifacts -type f \(
            -name "*.dmg" -o
            -name "*.app.tar.gz" -o
            -name "*.msi" -o
            -name "*.exe" -o
            -name "*.zip"
          \) -print0 | while IFS= read -r -d '' file; do
            cp "$file" release-upload/
          done

          if ! ls -1 release-upload/* >/dev/null 2>&1; then
            echo "No installable assets were found in release artifacts."
            exit 1
          fi

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-upload
          find . -type f -print0 | sort -z | xargs -0 shasum -a 256 > SHA256SUMS.txt

      - name: Generate release notes
        run: |
          set -euo pipefail
          cat > release-upload/RELEASE_NOTES.md <<EOF
          Operarius ${RELEASE_TAG}

          Download and install:
          - macOS Intel: download the x86_64 .dmg file
          - macOS Apple Silicon: download the aarch64 .dmg file
          - Windows x64: download the .msi installer (or .exe when provided)

          Verify downloads:
          - SHA-256 checksums are published in SHA256SUMS.txt
          - macOS/Linux verify command: shasum -a 256 -c SHA256SUMS.txt
          - Windows PowerShell verify command: Get-FileHash <file> -Algorithm SHA256

          Notes:
          - Unsigned builds can still be installed, but your OS may show a security prompt.
          - If both .msi and .exe are present on Windows, .msi is recommended for most users.
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Operarius ${{ env.RELEASE_TAG }}
          body_path: release-upload/RELEASE_NOTES.md
          generate_release_notes: true
          append_body: true
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: release-upload/**
